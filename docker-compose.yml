version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_NAME: ${COOKIE_NAME:-agencyos_session}
      COOKIE_MAX_AGE: ${COOKIE_MAX_AGE:-604800}
      APP_URL: ${APP_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      ADMIN_SECRET: ${ADMIN_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-AgencyOS <noreply@agencyos.app>}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      LOCAL_UPLOAD_DIR: /app/uploads
      STORAGE_BASE_URL: ${STORAGE_BASE_URL:-}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-10}
      RATE_LIMIT_AUTH_WINDOW: ${RATE_LIMIT_AUTH_WINDOW:-900}
      RATE_LIMIT_API_MAX: ${RATE_LIMIT_API_MAX:-100}
      RATE_LIMIT_API_WINDOW: ${RATE_LIMIT_API_WINDOW:-60}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # One-shot migration runner — runs before app starts
  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "npx prisma migrate deploy && npx prisma db seed"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: "no"

volumes:
  uploads:
    driver: local

networks:
  default:
    name: agencyos
